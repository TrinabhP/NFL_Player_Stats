services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: nfl_player_stats
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d nfl_player_stats"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      POSTGRES_URI: postgresql+psycopg://myuser:mypassword@db:5432/nfl_player_stats
      API_KEY: brat
    depends_on:
      db:
        condition: service_healthy
